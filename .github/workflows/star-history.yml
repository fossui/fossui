# Regenerates the star-history chart daily and commits it into the repo.
name: Star History

on:
  schedule:
    - cron: '0 0 * * *'   # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
          # pub.dev renders plain-markdown PNG, not <picture>/SVG dark-mode.
          readme-format: png
          # First theme is the PNG source; put dark first for a dark chart.
          themes: dark,light
