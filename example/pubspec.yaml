name: foss_ui_example
description: Widgetbook catalog and example app for foss_ui.
publish_to: none

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  foss_ui:
    path: ../
  lucide_icons_flutter: ^3.1.14+2
  widgetbook: ">=3.0.0 <4.0.0"
  widgetbook_annotation: ">=3.0.0 <4.0.0"

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  widgetbook_generator: ">=3.0.0 <4.0.0"

flutter:
  uses-material-design: true
