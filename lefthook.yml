# Lefthook config for foss_ui (Flutter package, FVM-managed)
# https://lefthook.dev/

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.dart"
      run: fvm dart format {staged_files}
      stage_fixed: true
    analyze:
      glob: "*.dart"
      run: fvm flutter analyze

pre-push:
  commands:
    test:
      run: fvm flutter test

# Prepend an emoji based on the conventional-commit type.
# {1} = commit msg file, {2} = commit source (git hook args).
prepare-commit-msg:
  commands:
    emoji:
      run: sh scripts/git-hooks/commit-msg-emoji.sh {1} {2}

# Reject messages that are not Conventional Commits. {1} = commit msg file.
commit-msg:
  commands:
    lint:
      run: sh scripts/git-hooks/commit-msg-lint.sh {1}

