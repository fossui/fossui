name: fossui
description: >-
  An open-source Flutter UI library of themeable, accessible components (buttons,
  inputs, dialogs, drawers, sheets, overlays), inspired by coss.com/ui, Cal.com's
  design system.
version: 0.1.1
homepage: https://fossui.org
repository: https://github.com/fossui/fossui
issue_tracker: https://github.com/fossui/fossui/issues
documentation: https://fossui.org/docs

topics:
  - ui
  - coss
  - design-system
  - components
  - theming

screenshots:
  - path: assets/showcase.png
    description: Overview of fossui components rendered in the dark theme.
  - path: assets/alert-button.png
    description: Alert variants plus button styles, sizes, and loading states.
  - path: assets/switch-slider.png
    description: Switches and sliders across default, disabled, and custom states.
  - path: assets/select-checkbox.png
    description: Select and checkbox controls with single and multiple selection.

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  theme_tailor_annotation: ^3.1.3

dev_dependencies:
  alchemist: ^0.14.0
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  theme_tailor: ^3.1.3
  very_good_analysis: ^10.2.0

flutter:
  fonts:
    - family: Geist
      fonts:
        - asset: fonts/Geist-Variable.ttf
